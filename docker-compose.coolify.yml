# Docker Compose for wrric-system deployment on Coolify
# This file includes PostgreSQL, Backend (FastAPI), and Frontend (Next.js)

version: '3.8'

services:

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wrric-backend
    restart: unless-stopped
    ports:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change_this_to_a_secure_random_string}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
      - LOG_LEVEL=WARNING
      - PYTHONPATH=/app
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wrric-frontend
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${BACKEND_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${BACKEND_URL:-http://localhost:8000}
    depends_on:
      - backend
  
