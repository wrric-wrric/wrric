# Docker Compose for wrric-system deployment
# This file includes PostgreSQL, Backend (FastAPI), and Frontend (Next.js)

version: '3.8'

services:

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: wrric-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=wrric_password
      - POSTGRES_DB=wrric
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wrric-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:wrric_password@db:5432/wrric
      - JWT_SECRET_KEY=change_this_to_a_secure_random_string
      - FRONTEND_URL=https://hack.wrric.nyawasco.co.ke
      - BACKEND_URL=https://back.wrric.nyawasco.co.ke
      - LOG_LEVEL=WARNING
      - PYTHONPATH=/app
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wrric-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://back.wrric.nyawasco.co.ke
      - NEXT_PUBLIC_WS_URL=https://back.wrric.nyawasco.co.ke
      - NEXT_PUBLIC_BACKEND_URL=https://back.wrric.nyawasco.co.ke
    depends_on:
      - backend

volumes:
  postgres_data:
